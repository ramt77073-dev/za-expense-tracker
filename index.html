<!DOCTYPE html>
<html>
    <head>
        <title>Expense Tracker</title>

        <style>
            body {
                font-family: Arial;
                background: #f4f4f4;
                padding: 20px;
            }

            .container {
                max-width: 800px;
                margin: 0 auto;
                background: white;
                padding: 25px;
                border-radius: 12px;
            }

            .navbar {
                background: black;
                color: white;
                padding: 15px;
                border-radius: 10px;
                margin-bottom: 20px;
                text-align: center;
            }

            input, button {
                padding: 10px;
                margin: 5px;
                border-radius: 6px;
                border: 1px solid #aaa;
            }

            button {
                background: black;
                color: white;
                cursor: pointer;
            }

            button:hover {
                background: #333;
            }

            li {
                list-style: none;
                background: #eee;
                padding: 12px;
                margin: 10px 0;
                border-radius: 8px;
            }

            .danger {
                background: red;
            }

            .success {
                color: green;
                font-weight: bold;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <div class="navbar">
                <h1>Expense Tracker</h1>
            </div>

            <h2>Signup</h2>
            <input id="signupUsername" placeholder="Username">
            <input id="signupPassword" type="password" placeholder="Password">
            <button onclick="signup()">Signup</button>

            <h2>Login</h2>
            <input id="username" placeholder="Username">
            <input id="password" type="password" placeholder="Password">
            <button onclick="login()">Login</button>
            <button onclick="logout()">Logout</button>

            <p id="loginStatus"></p>

            <h2>Add Expense</h2>
            <input id="title" placeholder="Title">
            <input id="amount" type="number" placeholder="Amount">
            <input id="category" placeholder="Category">
            <button onclick="addExpense()">Add Expense</button>
            <button onclick="saveUpdate()">save Update</button>

            <h2>Dashboard</h2>
            <button onclick="loadTotal()">Show Total</button>
            <button onclick="loadTopCategory()">Top Category</button>
            <button onclick="loadMonthlySummary()">Monthly Summary</button>
            <button onclick="loadStats()">Category Stats</button>
            <button onclick="downloadPDF()">Download PDF</button>
            <button onclick="downloadCSV()">Export to CSV</button>
            <p id="statsResult"></p>
            

            <p id="totalAmount">Total: $0</p>
            <p id="topCategory"></p>
            <p id="monthlySummary"></p>

            <h2>Filter</h2>
            <input id="filterCategory" placeholder="Filter by Category">
            <button onclick="filterExpenses()">Filter</button>

            <h2>Expenses</h2>
            <input id="searchTitle" placeholder="Search by Title">
            <button onclick="searchExpenses()">Search</button>
            <button onclick="loadPage(1)">Load Expenses</button>
            <button onclick="sortExpenses()">High to Low</button>
            <button onclick="sortExpensesLowToHigh()">Low to High</button>
            <button onclick="previousPage()">
                Previous
            </button>
            <button onclick="nextPage()">
                Next
            </button>

            <p id="pageNumber">
                Page: 1
            </p>

            <h2>Expense Chart</h2>
            <canvas id="expenseChart" width="400" height="200"></canvas>
            <button onclick="loadChart()">Load Chart</button>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
            <div id="expenseList"></div>
        </div>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <script>
            let token = localStorage.getItem("token") || "";

            let currentPage = 1;

            async function signup() {
                const username = document.getElementById("signupUsername").value;
                const password = document.getElementById("signupPassword").value;

                const res = await fetch("http://127.0.0.1:8000/signup", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();
                alert(data.message || data.detail);
            }

            async function login() {
                const username = document.getElementById("username").value;
                const password = document.getElementById("password").value;

                const res = await fetch("http://127.0.0.1:8000/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                if (data.access_token) {
                    token = data.access_token;
                    localStorage.setItem("token", token);
                    document.getElementById("loginStatus").innerText = "Logged in successfully!";
                    document.getElementById("loginStatus").className = "success";
                } else {
                    alert(data.detail || "Login failed");
                }
            }

            function logout() {
                token = "";
                localStorage.removeItem("token");
                document.getElementById("loginStatus").innerText = "Logged out";
            }

            async function addExpense() {
                const title = document.getElementById("title").value;
                const amount = Number(document.getElementById("amount").value);
                const category = document.getElementById("category").value;

                if (!title || !amount || !category) {
                    alert("Please fill all fields");
                    return;
                }

                const res = await fetch("http://127.0.0.1:8000/add-expense", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token,
                    },
                    body: JSON.stringify({ title, amount, category})
                });
                const data = await res.json();
                alert(data.message || data.detail);

                document.getElementById("title").value = "";
                document.getElementById("amount").value = "";
                document.getElementById("category").value = "";

                loadExpenses();
            }

            async function loadExpenses() {
                const res = await fetch("http://127.0.0.1:8000/expenses", {
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                });
                const data = await res.json();
                renderExpenses(data);
            }

            async function deleteExpense(id) {

                const answer = confirm("Are you sure you want to delete this expense?");

                if(!answer){
                    return;
                }
                const res = await fetch(`http://127.0.0.1:8000/delete-expense/${id}`, {
                    method: "DELETE",
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                });

                const data = await res.json();
                alert(data.message || data.detail);
                loadExpenses();
                loadTotal();
                loadTopCategory();
            }

            async function updateExpense(id) {
                const res = await fetch(`http://127.0.0.1:8000/expense/${id}`, {
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                });

                const expense = await res.json();
                console.log(expense);

                document.getElementById("title").value = expense.title || "";
                document.getElementById("amount").value = expense.amount || "";
                document.getElementById("category").value = expense.category || "";

                editingExpenseId = id;
            }

            async function saveUpdate() {
                if (!editingExpenseId) {
                    alert("First click Update on any expense");
                    return;
                }

                const title = document.getElementById("title").value;
                const amount = Number(document.getElementById("amount").value);
                const category = document.getElementById("category").value;

                if (!title || !amount || !category) {
                    alert("Please fill all fields");
                    return;
                }

                const res = await fetch(`http://127.0.0.1:8000/update-expense/${editingExpenseId}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify({ title, amount, category })
                });

                const data = await res.json();
                alert(data.message || data.detail);

                editingExpenseId = null;

                document.getElementById("title").value = "";
                document.getElementById("amount").value = "";
                document.getElementById("category").value = "";

                loadExpenses();
                loadTotal();
                loadTopCategory();
            }
            
            async function loadStats() {
                const res = await fetch("http://127.0.0.1:8000/stats", {
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                });
                const data = await res.json();

                let output = "";

                for (let category in data) {
                    output += category + ": $" + data[category] + "<br>";
                }
                document.getElementById("statsResult").innerHTML = output;
            }

            async function filterExpenses() {
                const category = document.getElementById("filterCategory").value;

                const res = await fetch(`http://127.0.0.1:8000/expenses/category/${category}`, {
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                });
                const data = await res.json();
                renderExpenses(data);
            }

            async function loadTotal() {
                const res = await fetch("http://127.0.0.1:8000/expenses/total", {
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                });
                const data = await res.json();
                document.getElementById("totalAmount").innerText = 
                    "Total: $" + data.total_expenses;
            }

            async function loadTopCategory() {
                const res = await fetch("http://127.0.0.1:8000/top-category", {
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                });
                const data = await res.json();

                if (data.top_category) {
                    document.getElementById("topCategory").innerText =
                       "Top Category: " + data.top_category + " $" + data.amount;
                } else {
                    document.getElementById("topCategory").innerText = data.message;
                }
            }

            async function loadMonthlySummary() {
                const month = prompt("Enter month like 2025-06");

                const res = await fetch(`http://127.0.0.1:8000/monthly-summary/${month}`, {
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                });
                const data = await res.json();
                document.getElementById("monthlySummary").innerText = 
                    "Month: " + data.month + " | Total: $" + data.total;
            }

            function searchExpenses() {
                const searchText = 
                    document.getElementById("searchTitle").value.toLowerCase();

                const expenseCards = 
                    document.querySelectorAll(".expense-card");

                expenseCards.forEach(card => {
                    const text = card.innerText.toLowerCase();

                    if (text.includes(searchText)) {
                        card.style.display = "block";
                    } else {
                        card.style.display = "none";
                    }
                });
            }

            function renderExpenses(data) {

                const expenseList = 
                    document.getElementById("expenseList");

                expenseList.innerHTML = "";

                data.forEach(expense => {

                    const div = 
                        document.createElement("div");
                    
                    div.className = "expense-card";

                    div.innerHTML = `
                        <p>${expense.title} - $${expense.amount} - ${expense.category} - ${expense.date}</p>
                        <button onclick="updateExpense('${expense._id}')">Update</button>

                        <button onclick="deleteExpense('${expense._id}')">Delete</button>
                    `;

                    expenseList.appendChild(div);

                })
            }

            async function sortExpenses() {
                const res = await fetch("http://127.0.0.1:8000/expenses", {
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                });
                const data = await res.json();

                data.sort((a, b) => b.amount - a.amount);
                renderExpenses(data);
            }

            async function sortExpensesLowToHigh() {
                const res = await fetch("http://127.0.0.1:8000/expenses", {
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                });
                const data = await res.json();

                data.sort((a, b) => a.amount - b.amount);
                renderExpenses(data);
            }

            async function loadPage(page) {
                const res = await fetch(
                    `http://127.0.0.1:8000/expenses/page/${page}`,
                    {
                        headers: {
                            "Authorization": "Bearer " + token
                        }
                    }
                );
                const data = await res.json();
                renderExpenses(data);

                document.getElementById("pageNumber").innerText = "Page: " + currentPage;
            }

            function nextPage() {
                currentPage++;
                loadPage(currentPage);
                console.log("Current Page:", currentPage);
            }

            function previousPage() {
                if(currentPage > 1){
                    currentPage--;
                    loadPage(currentPage);
                }
            }

            let chart;

            async function loadChart() {
                const res = await fetch(
                    "http://127.0.0.1:8000/chart-data",
                    {
                        headers: {
                            "Authorization": "Bearer " + token
                        }
                    }
                );

                const data = await res.json();

                const labels = Object.keys(data);
                const amounts = Object.values(data);

                const ctx = 
                    document.getElementById("expenseChart");

                if(chart){
                    chart.destroy();
                }

                chart = new Chart(ctx, {
                    type: "pie",
                    data: {
                        labels: labels,
                        datasets: [{
                            data: amounts
                        }]
                    }
                });
            }

            async function downloadPDF() {
                const res = await fetch(
                    "http://127.0.0.1:8000/all-expenses",
                    {
                        headers: {
                            "Authorization": "Bearer " + token
                        }
                    }
                );

                const expenses = await res.json();

                const { jsPDF } = window.jspdf;

                const doc = new jsPDF();

                doc.text(
                    "Expense Report",
                    20,
                    20
                );

                let y = 40;

                expenses.forEach(expense => {
                    doc.text(
                        `${expense.title} - $${expense.amount} - ${expense.category}`,
                        20,
                        y
                    );

                    y += 10;
                });

                doc.save("Expense_Report.pdf");
            }

            async function downloadCSV() {
                const res = await fetch("http://127.0.0.1:8000/all-expenses", {
                    headers: {
                        "Authorization": "Bearer " + token
                    }
            });

            const expenses = await res.json();

            let csv = "Title,Amount,Category\n";
            expenses.forEach(expense => {
                csv += `${expense.title},${expense.amount},${expense.category}\n`;
            });

            const blob = new Blob([csv], { type: "text/csv" });

            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "expenses.csv";
            link.click();

        }
        </script>

    </body>
    
</html>
